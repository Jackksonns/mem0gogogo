# CognitiveBench seed manifest (schema only — seeded values are TODO).
#
# Status: config-only. This file declares the *shape* of the seed manifest
# that generators/cognitivebench.py will consume. The concrete values below
# are placeholders and MUST be frozen before any headline number derived
# from CognitiveBench is reported.
#
# The schema intentionally mirrors the description in paper/sections/
# appendix.tex so that readers can cross-reference generator parameters
# against the paper's Table of benchmark statistics.
schema_version: 0

# Number of simulated dialogues. Paper target: 50.
num_dialogues: TODO

# Total conversation turns across all dialogues. Paper target: 1000+.
# Leave as null; will be computed post-hoc from the generated data and
# written back by generators/cognitivebench.py.
target_total_turns: null

# Emotional events per dialogue. Paper target: 8.
emotional_events_per_dialogue: TODO

# Recurring patterns per dialogue. Paper target: 5.
recurring_patterns_per_dialogue: TODO

# Fraction of turns that are distractors / noise. Paper target: 0.30.
noise_ratio: TODO

# Difficulty strata. Each stratum contributes a fraction of the total
# dialogues; fractions must sum to 1.0.
difficulty_strata:
  easy: TODO
  medium: TODO
  hard: TODO

# Query taxonomy. Each class contributes a fraction of the total queries;
# fractions must sum to 1.0.
query_taxonomy:
  factual_recall: TODO
  temporal_reasoning: TODO
  emotional_context: TODO
  schema_induction: TODO
  contradiction_resolution: TODO

# PRNG seeds used by generators/cognitivebench.py. When frozen, these make
# the generated benchmark reproducible bit-for-bit.
rng_seeds:
  dialogue_sampling: TODO
  emotion_injection: TODO
  noise_injection: TODO
  query_sampling: TODO

# Leak-check budget. The generator must verify that no gold answer token
# sequence appears verbatim in the distractor stream. Raise if >= threshold.
leak_check:
  max_allowed_leaks_per_dialogue: 0
