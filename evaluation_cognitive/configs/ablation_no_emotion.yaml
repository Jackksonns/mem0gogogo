# Ablation: disable the emotion analyzer.
# Retention still runs but always sees E=0, so the retention formula
# collapses to the classic Ebbinghaus curve (R = exp(-t / tau_base)).
#
# Status: config-only. No runnable code depends on this file yet.
run_id: ablation_no_emotion
description: >
  Disable emotion extraction at add-time. Retention and consolidation still
  run; meta-learner still optimizes tau_base and lambda (though lambda
  becomes inert).

dataset:
  name: cognitivebench
  seeds: configs/cognitivebench_seeds.yaml

memory:
  cognitive:
    enabled: true
    emotion:
      enabled: false
    retention:
      enabled: true
      lambda_value: 1.0
      tau_base: 100.0
      enable_emotion_weighting: true
    consolidation:
      enabled: true
      min_memories_for_consolidation: 10
      strategy: summarize
    meta_learner:
      enabled: true
      update_strategy: topk_weighted_mean
      top_k: 5

evaluation:
  metrics:
    - retention_at_k
    - consolidation_rate
    - answer_attribution_accuracy
  num_seeds: 50
  report_std: true

output_dir: expected_outputs/ablation_no_emotion
