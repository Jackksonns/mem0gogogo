# Ablation: disable sleep consolidation.
# Emotion + retention still active at retrieval time.
#
# Status: config-only. No runnable code depends on this file yet.
run_id: ablation_no_consolidation
description: >
  Skip the offline sleep consolidation cycle. Memories accumulate without
  schema induction; retention re-ranking still applies at search time.

dataset:
  name: cognitivebench
  seeds: configs/cognitivebench_seeds.yaml

memory:
  cognitive:
    enabled: true
    emotion:
      enabled: true
    retention:
      enabled: true
      lambda_value: 1.0
      tau_base: 100.0
      enable_emotion_weighting: true
    consolidation:
      enabled: false
    meta_learner:
      enabled: true
      update_strategy: topk_weighted_mean
      top_k: 5

evaluation:
  metrics:
    - retention_at_k
    - consolidation_rate
    - answer_attribution_accuracy
  num_seeds: 50
  report_std: true

output_dir: expected_outputs/ablation_no_consolidation
