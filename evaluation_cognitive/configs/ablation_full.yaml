# Full configuration: all cognitive modules enabled.
# Consumed by scripts/run_ablation.py (currently NotImplementedError).
#
# Status: config-only. No runnable code depends on this file yet.
run_id: ablation_full
description: >
  All three cognitive modules on: emotion-weighted retention, sleep
  consolidation, and the top-k-weighted meta-learner. Reference configuration
  for the paper's "Full" row.

dataset:
  name: cognitivebench
  seeds: configs/cognitivebench_seeds.yaml

memory:
  cognitive:
    enabled: true
    emotion:
      enabled: true
    retention:
      enabled: true
      lambda_value: 1.0
      tau_base: 100.0
      enable_emotion_weighting: true
    consolidation:
      enabled: true
      min_memories_for_consolidation: 10
      strategy: summarize
    meta_learner:
      enabled: true
      update_strategy: topk_weighted_mean
      top_k: 5

evaluation:
  metrics:
    - retention_at_k
    - consolidation_rate
    - answer_attribution_accuracy
  num_seeds: 50
  report_std: true

output_dir: expected_outputs/ablation_full
